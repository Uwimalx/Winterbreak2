<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Winterbreak2</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background: #f9f9f9;
        }
        .outer {
            display: table;
            width: 100%;
            height: 100%;
        }
        .inner {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-family: Georgia, "Times New Roman", serif;
            font-weight: 400;
            margin: 2px 0 6px;
        }
        .subtitle {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 24px;
        }
        .btn-group {
            display: -webkit-flex;
            display: flex;
            -webkit-flex-direction: column;
            flex-direction: column;
            -webkit-align-items: center;
            align-items: center;
            gap: 12px;
            margin: 12px 0;
        }
        .btn {
            font-family: inherit;
            padding: 0.6rem 1.2rem;
            font-weight: 500;
            border: 2px solid #111827;
            border-radius: 0.375rem;
            background: white;
            color: #111827;
            cursor: pointer;
            font-size: 0.875rem;
            min-width: 120px;
            transition: all 0.15s ease;
        }
        .btn:hover {
            background: #111827;
            color: white;
        }
        .info {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #333;
            background: #f0f0f0;
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
            max-width: 600px;
            text-align: left;
            word-break: break-all;
        }
        .info code {
            background: #e0e0e0;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        @media (max-width: 480px) {
            .btn {
                min-width: 100px;
                font-size: 0.8rem;
                padding: 0.5rem 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="outer">
    <div class="inner">
        <h1>Winterbreak2</h1>
        <p class="subtitle">By Scam.Net, Penguins184, Uwimalx</p>

        <div class="btn-group">
            <button class="btn" id="modeA">Mode A</button>
            <button class="btn" id="modeB">Mode B</button>
            <button class="btn" id="modeC">Mode C</button>
        </div>

        <div class="info">
            <strong>Mode A</strong>: Generate an empty .mobi file with malicious filename (client-side)<br>
            <strong>Mode B</strong>: Execute the Kindle API call directly in browser<br>
            <strong>Mode C</strong>: Redirect to <code>https://winterbreak2.netlify.app/download</code> for original file
        </div>
    </div>
</div>

<script>
    (function() {
        var FILENAME_A = '<script>(window.kindle||top.kindle).messaging.sendMessage("com.lab126.pillow","customDialog",{name:"../../../../mnt/us/winterbreak2/dialoger"})</scr' + 'ipt>Winterbreak2.mobi';

        var PAYLOAD = '(window.kindle||top.kindle).messaging.sendMessage("com.lab126.pillow","customDialog",{name:"../../../../mnt/us/winterbreak2/dialoger"})';

        var API_URL = 'https://winterbreak2.netlify.app/download';

        // Mode A
        document.getElementById('modeA').addEventListener('click', function() {
            var blob = new Blob([], { type: 'application/x-mobipocket-ebook' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = FILENAME_A;
            document.body.appendChild(a);
            a.click();
            setTimeout(function() {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        });

        // Mode B
        document.getElementById('modeB').addEventListener('click', function() {
            try {
                var result = eval(PAYLOAD);
                console.log('[Mode B] Payload executed, result:', result);
            } catch (e) {
                console.error('[Mode B] Error:', e);
            }
        });

        // Mode C
        document.getElementById('modeC').addEventListener('click', function() {
            window.location.href = API_URL;
        });
    })();
</script>
</body>
</html>
